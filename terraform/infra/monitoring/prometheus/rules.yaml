groups:
  - name: prometheus_alertmanager_rules
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is down"

      - alert: HighCPU
        expr: (100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }} ({{ $value | printf \"%.0f\" }}%)"

      - alert: HighDisk
        expr: (node_filesystem_avail_bytes * 100) / node_filesystem_size_bytes < 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk on {{ $labels.instance }} ({{ $value | printf \"%.0f\" }}% free)"
  