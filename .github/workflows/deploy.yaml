name: Deploy Image and Infrastructure
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v4
        with:
          context: ./src
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/app:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/app:latest

  terraform-network-plan:
    name: Terraform plan network
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/network
        run: terraform init

      - name: Terraform format check
        working-directory: ./terraform/network
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: ./terraform/network
        run: terraform validate

      - name: Terraform plan
        working-directory: ./terraform/network
        run: terraform plan

  terraform-network-apply:
    name: Terraform apply network
    runs-on: ubuntu-latest
    needs: terraform-network-plan
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/network
        run: terraform init

      - name: Terraform apply if changes
        working-directory: ./terraform/network
        run: |
          set +e
          terraform plan -detailed-exitcode
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 1 ]; then exit 1; fi
          if [ $EXIT_CODE -eq 2 ]; then terraform apply -auto-approve; fi

  terraform-db-plan:
    name: Terraform plan db
    runs-on: ubuntu-latest
    needs: terraform-network-apply
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/db
        run: terraform init

      - name: Terraform format check
        working-directory: ./terraform/db
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: ./terraform/db
        run: terraform validate

      - name: Terraform plan
        working-directory: ./terraform/db
        run: terraform plan

  terraform-db-apply:
    name: Terraform apply db
    runs-on: ubuntu-latest
    needs: terraform-db-plan
    environment: db-apply
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/db
        run: terraform init

      - name: Terraform apply if changes
        working-directory: ./terraform/db
        run: |
          set +e
          terraform plan -detailed-exitcode
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 1 ]; then exit 1; fi
          if [ $EXIT_CODE -eq 2 ]; then terraform apply -auto-approve; fi

  terraform-infra-plan:
    name: Terraform plan infra
    runs-on: ubuntu-latest
    needs: terraform-network-apply
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/infra
        run: terraform init

      - name: Terraform format check
        working-directory: ./terraform/infra
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: ./terraform/infra
        run: terraform validate

      - name: Terraform plan
        working-directory: ./terraform/infra
        run: terraform plan

  terraform-infra-apply:
    name: Terraform apply infra
    runs-on: ubuntu-latest
    needs: terraform-infra-plan
    environment: infra-apply
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/infra
        run: terraform init

      - name: Terraform apply if changes
        working-directory: ./terraform/infra
        run: |
          set +e
          terraform plan -detailed-exitcode
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 1 ]; then exit 1; fi
          if [ $EXIT_CODE -eq 2 ]; then terraform apply -auto-approve; fi

  write-to-db:
    name: Register deploy in DB
    runs-on: ubuntu-latest
    needs: [terraform-network-apply, terraform-db-apply, terraform-infra-apply]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/infra
        run: terraform init

      - name: Trigger instance refresh
        run: |
          aws autoscaling start-instance-refresh --auto-scaling-group-name main-asg --preferences MinHealthyPercentage=50,InstanceWarmup=300
          aws autoscaling wait instance-refresh-succeeded --auto-scaling-group-name main-asg

      - name: Wait for ALB health
        run: |
          ALB_DNS=$(terraform -chdir=./terraform/infra output -raw alb_dns_name)
          for ((i=0; i<10; i++)); do
            curl -sf "http://$ALB_DNS/health" && break
            echo "Attempt $i/10, retrying in 15s..."
            sleep 15
          done
          curl -sf "http://$ALB_DNS/health" || exit 1

      - name: Register Deployment in DB
        run: |
          ALB_DNS=$(terraform -chdir=./terraform/infra output -raw alb_dns_name)
          API_KEY=$(aws ssm get-parameter --name "/prod/api-key" --query "Parameter.Value" --output text --with-decryption)
          curl -X POST "http://$ALB_DNS/deploys" \
            -H "X-Api-Key: $API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"commitSha\":\"${{ github.sha }}\",\"author\":\"${{ github.actor }}\",\"message\":\"${{ github.event.head_commit.message }}\",\"committedAt\":\"${{ github.event.head_commit.timestamp }}\"}"