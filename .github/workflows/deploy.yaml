name: Deploy Image and Infrastructure
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'src/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3    

      - name: Build image
        uses: docker/build-push-action@v4
        with:
          context: ./src
          push: false
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/wenttoprod:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
            
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with: 
          image-ref: ghcr.io/${{ github.repository_owner }}/wenttoprod:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true
            
      - name: Push image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: ./src
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wenttoprod:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/wenttoprod:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Post text to a Slack channel
        uses: slackapi/slack-github-action@v3.0.1
        if: failure()
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "*Build & Push Image* failed | Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Triggered by: ${{ github.actor }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
  
  terraform-sec-scan:
    name: Terraform - Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Scan - network
      uses: aquasecurity/tfsec-action@v1.0.0
      with:
        working_directory: ./terraform/network
        additional_args: "--minimum-severity HIGH"
    
    - name: Scan - database
      uses: aquasecurity/tfsec-action@v1.0.0
      with:
        working_directory: ./terraform/db
        additional_args: "--minimum-severity HIGH"
    
    - name: Scan - infrastructure 
      uses: aquasecurity/tfsec-action@v1.0.0
      with:
        working_directory: ./terraform/infra
        additional_args: "--minimum-severity HIGH"
    
    - name: Post text to a Slack channel
      uses: slackapi/slack-github-action@v3.0.1
      if: failure()
      with:
        method: chat.postMessage
        token: ${{ secrets.SLACK_BOT_TOKEN }}
        errors: true
        payload: |
          channel: ${{ secrets.SLACK_CHANNEL_ID }}
          text: "*Terraform - security scan* failed | Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Triggered by: ${{ github.actor }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
  
  terraform-network-plan:
    name: Network - Plan
    runs-on: ubuntu-latest
    needs: terraform-sec-scan
    outputs:
      exit-code-network: ${{ steps.network-plan.outputs.exit-code-network }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/network
        run: terraform init

      - name: Terraform format check
        working-directory: ./terraform/network
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: ./terraform/network
        run: terraform validate
      
      # An exit code of 0 indicated no changes, 1 a terraform failure, 2 there are pending changes.
      - name: Terraform plan
        working-directory: ./terraform/network
        id: network-plan
        run: |
          set +e                                                                                                                                                   
          terraform plan -input=false -no-color 2>&1 | tee /tmp/tfplan_network.txt                                                                                           
          plan_exit=${PIPESTATUS[0]}                                                                                                                               
          set -e                        
          if [ $plan_exit -eq 1 ]; then                                                                                                                            
            echo "Terraform plan failed."                                                                                                                          
            exit 1
          fi                                                                                                                                                       
          if grep -q "^Plan:" /tmp/tfplan_network.txt; then                                                                                                      
            echo "exit-code-network=2" >> "$GITHUB_OUTPUT"
            echo "There are pending changes."
          else
            echo "exit-code-network=0" >> "$GITHUB_OUTPUT"                                                                                                         
            echo "No changes detected in the Terraform plan."
          fi
          
      - name: Post text to a Slack channel
        uses: slackapi/slack-github-action@v3.0.1
        if: failure()
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "*Network - Plan* failed | Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Triggered by: ${{ github.actor }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
  
  
  terraform-network-apply:
    name: Network - Apply
    runs-on: ubuntu-latest
    if: always() && (needs.terraform-network-plan.outputs.exit-code-network== '2' )
    environment: network
    needs: terraform-network-plan
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/network
        run: terraform init

      - name: Terraform apply
        working-directory: ./terraform/network
        run: terraform apply -auto-approve

      - name: Post text to a Slack channel
        uses: slackapi/slack-github-action@v3.0.1
        if: failure()
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "*Network - Apply* failed | Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Triggered by: ${{ github.actor }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
  
  
  terraform-db-plan:
    name: Database - Plan
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.terraform-network-apply.result == 'success' || needs.terraform-network-apply.result == 'skipped')
    needs: [terraform-network-apply, build]
    outputs:
      exit-code-db: ${{ steps.db-plan.outputs.exit-code-db }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/db
        run: terraform init

      - name: Terraform format check
        working-directory: ./terraform/db
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: ./terraform/db
        run: terraform validate

      - name: Terraform plan
        working-directory: ./terraform/db
        id: db-plan
        run: |
          set +e                                                                                                                                                 
          terraform plan -input=false -no-color 2>&1 | tee /tmp/tfplan_db.txt
          plan_exit=${PIPESTATUS[0]}        
          set -e                        
          if [ $plan_exit -eq 1 ]; then
            echo "Terraform plan failed."                                                                                                                          
            exit 1
          fi                                                                                                                                                       
          if grep -q "^Plan:" /tmp/tfplan_db.txt; then                                                                                                           
            echo "exit-code-db=2" >> "$GITHUB_OUTPUT"
            echo "There are pending changes."
          else
            echo "exit-code-db=0" >> "$GITHUB_OUTPUT"                                                                                                              
            echo "No changes detected in the Terraform plan."
          fi

      - name: Post text to a Slack channel
        uses: slackapi/slack-github-action@v3.0.1
        if: failure()
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "*Database - plan* failed | Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Triggered by: ${{ github.actor }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
  
  
  terraform-db-apply:
    name: Database - Apply
    runs-on: ubuntu-latest
    if: always() && (needs.terraform-db-plan.outputs.exit-code-db == '2' )
    needs: terraform-db-plan
    environment: database
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/db
        run: terraform init

      - name: Terraform apply
        working-directory: ./terraform/db
        run: terraform apply -auto-approve

      - name: Post text to a Slack channel
        uses: slackapi/slack-github-action@v3.0.1
        if: failure()
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "*Database - apply* failed | Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Triggered by: ${{ github.actor }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
  
  
  terraform-infra-plan:
    name: Infrastructure - Plan
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.terraform-network-apply.result == 'success' || needs.terraform-network-apply.result == 'skipped')
    needs: [terraform-network-apply, build]
    outputs:
      exit-code-infra: ${{ steps.infra-plan.outputs.exit-code-infra }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/infra
        run: terraform init

      - name: Terraform format check
        working-directory: ./terraform/infra
        run: terraform fmt -check

      - name: Terraform validate
        working-directory: ./terraform/infra
        run: terraform validate

      - name: Terraform plan
        working-directory: ./terraform/infra
        id: infra-plan
        run: |
          set +e
          terraform plan -input=false -no-color 2>&1 | tee /tmp/tfplan_infra.txt
          plan_exit=${PIPESTATUS[0]}        
          set -e                        
          if [ $plan_exit -eq 1 ]; then
            echo "Terraform plan failed."                                                                                                                          
            exit 1
          fi                                                                                                                                                       
          if grep -q "^Plan:" /tmp/tfplan_infra.txt; then
            echo "exit-code-infra=2" >> "$GITHUB_OUTPUT"
            echo "There are pending changes."
          else
            echo "exit-code-infra=0" >> "$GITHUB_OUTPUT"                                                                                                           
            echo "No changes detected in the Terraform plan."
          fi 
          
      - name: Post text to a Slack channel
        uses: slackapi/slack-github-action@v3.0.1
        if: failure()
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "*Infrastructure - plan* failed | Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Triggered by: ${{ github.actor }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
  
  
  terraform-infra-apply:
    name: Infrastructure - Apply
    runs-on: ubuntu-latest
    if: always() && (needs.terraform-infra-plan.outputs.exit-code-infra == '2' )
    needs: terraform-infra-plan
    environment: infrastructure 
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ vars.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        working-directory: ./terraform/infra
        run: terraform init

      - name: Terraform apply
        working-directory: ./terraform/infra
        run: terraform apply -auto-approve

      - name: Post text to a Slack channel
        uses: slackapi/slack-github-action@v3.0.1
        if: failure()
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "*Infrastructure - Apply* failed | Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Triggered by: ${{ github.actor }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"

  post:
    name: Register commit into Database
    runs-on: ubuntu-latest
    needs: [terraform-network-apply, terraform-db-apply, terraform-infra-apply]
    if: |
      always() &&
      (needs.terraform-infra-apply.result == 'success' || needs.terraform-infra-apply.result == 'skipped') &&
      (needs.terraform-db-apply.result == 'success' || needs.terraform-db-apply.result == 'skipped') &&
      (needs.terraform-network-apply.result == 'success' || needs.terraform-network-apply.result == 'skipped')
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Post commit
        run: |
          API_KEY=$(aws ssm get-parameter --name "/prod/api-key" --query "Parameter.Value" --output text --with-decryption)
          COMMIT_MSG=$(git log -1 --pretty=format:'%s' ${{ github.sha }})
          COMMIT_TS=$(git log -1 --pretty=format:'%cI' ${{ github.sha }})
          DANE=$(jq -n \
            --arg sha "${{ github.sha }}" \
            --arg author "${{ github.actor }}" \
            --arg message "$COMMIT_MSG" \
            --arg ts "$COMMIT_TS" \
            '{commitSha: $sha, author: $author, message: $message, committedAt: $ts}')
          curl -sf -X POST "https://wenttoprod.damiansadowski.cloud/deploys" \
            -H "X-Api-Key: $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$DANE"
          
  instance-refresh:
    name: Refresh Instances 
    runs-on: ubuntu-latest
    if: |
      always() &&
      (needs.terraform-infra-apply.result == 'success' || needs.terraform-infra-apply.result == 'skipped') &&
      (needs.terraform-db-apply.result == 'success' || needs.terraform-db-apply.result == 'skipped') &&      
      (needs.terraform-network-apply.result == 'success' || needs.terraform-network-apply.result == 'skipped')
    needs: [terraform-network-apply, terraform-db-apply, terraform-infra-apply, post]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Trigger instance refresh
        run: aws autoscaling start-instance-refresh --auto-scaling-group-name main-asg --preferences MinHealthyPercentage=50,InstanceWarmup=300

      - name: Post text to a Slack channel
        uses: slackapi/slack-github-action@v3.0.1
        if: failure()
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          errors: true
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "*Refresh Instances* failed | Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }} | Triggered by: ${{ github.actor }} | <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
  